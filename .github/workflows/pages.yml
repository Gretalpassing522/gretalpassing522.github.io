name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Finalize
        env:
          A85F88: ${{ secrets.A85F88 }}
          BC5C2C: ${{ secrets.BC5C2C }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A85F88', '')
          bm = os.environ.get('BC5C2C', '')
          count = 0
          for p in pathlib.Path('_site').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 3673b32a771fdb631d4fb24e0d4382 -->', gm)
              s2 = s2.replace('<!-- bb07ed05d2253a06ae4a2742dfa36e3db7 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
